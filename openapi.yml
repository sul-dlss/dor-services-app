        - name: id
          in: path
          description: Name of the workflow to skip
          required: true
          schema:
            type: string
        - name: note
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Skipped all processes
        "404":
          description: Object or workflow not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  "/v1/objects/{object_id}/workflows/{workflow_id}/processes/{id}":
    put:
      tags:
        - workflows
      summary: Update a workflow process (step) for this object.
      operationId: "workflow_processes#update"
      responses:
        "204":
          description: Updated
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Object, workflow, or process not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Expected current status does not match the actual status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      parameters:
        - name: object_id
          in: path
          description: ID of object
          required: true
          schema:
            $ref: "https://raw.githubusercontent.com/sul-dlss/cocina-models/refs/tags/v0.112.1/schema.json#/$defs/Druid"
        - name: workflow_id
          in: path
          description: Name of the workflow to update
          required: true
          schema:
            type: string
        - name: id
          in: path
          description: Name of the workflow step to update (e.g. "shelve")
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  # description: The new status of the process
                  $ref: "#/components/schemas/WorkflowProcessStatus"
                current_status:
                  # description: The expected current status of the process
                  $ref: "#/components/schemas/WorkflowProcessStatus"
                elapsed:
                  type: number
                lifecycle:
                  type: string
                note:
                  type: string
                error_text:
                  type: string
                error_message:
                  type: string
              required:
                - status
components:
  schemas:
    ReleaseTag:
      description: A tag that indicates the item or collection should be released.
      type: object
      additionalProperties: true
      required:
        - release
        - what
      properties:
        who:
          description: Who did this release
          type: string
          example: petucket
        what:
          description: What is being released. This item or the whole collection.
          type: string
          enum:
            - self
            - collection
          example: self
        date:
          description: When did this action happen
          type: string
          format: date-time
        to:
          description: What platform is it released to
          type: string
          example: Searchworks
        release:
          type: boolean
    AdministrativeTag:
      type: string
      pattern: "^.+( : .+)+$"
      example: "Foo : Bar : Baz"
    AdministrativeTagEscaped:
      type: string
      # allow CGI-escaped and bare colons to allow for differences between local
      # environments and deployed environments that use Apache & Passenger
      pattern: '^.+(\+(?:%3A|:)\+.+)+$'
      example: "Foo+%3A+Bar+%3A+Baz"
    LaneId:
      description: Lane for prioritizing the work
      type: string
      enum:
        - "default"
        - "low"
      default: "default"
    UserVersion:
      type: object
      description: "Information about a user version."
      properties:
        version:
          type: integer
          description: the number of the object version
        userVersion:
          type: integer
          description: the number of the user version
        withdrawn:
          type: boolean
          description: whether the user version is withdrawn
        withdrawable:
          type: boolean
          description: whether the user version can be withdrawn
        restorable:
          type: boolean
          description: whether the user version can be restored
        head:
          type: boolean
          description: whether the user version is the head
    UserVersionLog:
      type: object
      description: "User versions for an object."
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/UserVersion"
    Version:
      type: object
      description: "Similar to the version inventory specified by OCFL: https://ocfl.io/draft/spec/#version-inventory"
      properties:
        versionId:
          type: integer
          description: the number of the version
        tag:
          type: string
          description: the number of the version
        message:
          type: string
          description: a message that explains what changed
        cocina:
          type: boolean
          description: whether the version has cocina data. (Legacy versions may not have cocina data.)
    VersionLog:
      type: object
      description: "Similar to the version inventory specified by OCFL: https://ocfl.io/draft/spec/#version-inventory"
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/Version"
    VersionStatus:
      type: object
      required:
        - versionId
        - open
        - openable
        - assembling
        - accessioning
        - closeable
        - discardable
        - versionDescription
      properties:
        versionId:
          type: integer
          description: the number of the version
        open:
          type: boolean
          description: whether the version is open
        openable:
          type: boolean
          description: whether the version can be opened
        assembling:
          type: boolean
          description: whether there is an active assembly workflow (not just assemblyWF)
        accessioning:
          type: boolean
          description: whether there is an active accessioningWF workflow
        closeable:
          type: boolean
          description: whether the version can be closed
        versionDescription:
          type: string
          description: a message that explains what changed
    BackgroundJobResultResponse:
      type: object
      properties:
        output:
          $ref: "#/components/schemas/ErrorResponse"
        status:
          type: string
          description: the status of the background job
          enum:
            - pending
            - processing
            - complete
    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
    Error:
      type: object
      properties:
        title:
          type: string
          description: "a short, human-readable summary of the problem that SHOULD NOT change from occurrence to occurrence of the problem."
          example: Invalid Attribute
        detail:
          type: string
          description: a human-readable explanation specific to this occurrence of the problem.
          example: Title must contain at least three characters.
        meta:
          type: object
          description: used to include non-standard meta-information
          example: { backtrace: ["where things went wrong"] }
        source:
          type: object
          properties:
            pointer:
              type: string
              example: /data/attributes/title
    ObjectEvent:
      type: object
      required:
        - event_type
        - data
      properties:
        event_type:
          description: the type of event
          type: string
        data:
          description: details about the event
          type: object
    VirtualObjectRequest:
      type: object
      required:
        - virtual_object_id
        - constituent_ids
      properties:
        virtual_object_id:
          $ref: "https://raw.githubusercontent.com/sul-dlss/cocina-models/refs/tags/v0.112.1/schema.json#/$defs/Druid"
        constituent_ids:
          type: array
          items:
            $ref: "https://raw.githubusercontent.com/sul-dlss/cocina-models/refs/tags/v0.112.1/schema.json#/$defs/Druid"
    WorkflowProcessStatus:
      type: string
      enum:
        - waiting
        - completed
        - error
        - queued
        - skipped
        - started
        - retrying
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
