version: 2.1
orbs:
  ruby-rails:
    orbs:
        browser-tools: circleci/browser-tools@1.5.2
        codecov: codecov/codecov@6.0.0
        docker: circleci/docker@4.0.0
        node: circleci/node@7.1.0
        ruby: circleci/ruby@2.6.0
    commands:
        gem-install-deps:
            description: |
                Install dependencies without using deployment mode (suitable for gems).
            steps:
                - run:
                    command: bundle check || bundle install
                    name: Bundle Install
        rubocop-with-caching:
            description: Runs rubocop with cache restore and save
            parameters:
                cache-version:
                    default: v1
                    description: A prefix to the cache key for versioning
                    type: string
                path:
                    default: ../.cache/rubocop_cache
                    description: The path of the rubocop cache
                    type: string
            steps:
                - restore_cache:
                    keys:
                        - << parameters.cache-version >>-rubocop-cache-{{ checksum ".rubocop.yml" }}-{{ .Branch }}
                        - << parameters.cache-version >>-rubocop-cache-{{ checksum ".rubocop.yml" }}-main
                        - << parameters.cache-version >>-rubocop-cache-{{ checksum ".rubocop.yml" }}
                - ruby/rubocop-check
                - save_cache:
                    key: << parameters.cache-version >>-rubocop-cache-{{ checksum ".rubocop.yml" }}-{{ .Branch }}-{{ epoch }}
                    paths:
                        - << parameters.path >>
        test:
            description: |
                Runs rspec wrapped with code coverage.
            parameters:
                codecov-token:
                    default: CODECOV_TOKEN
                    description: |
                        Name of environment variable storing your CodeCov token
                    type: env_var_name
                use-codecov:
                    default: true
                    description: True because CodeClimate is no longer supported
                    type: boolean
            steps:
                - ruby/rspec-test:
                    rerun-fail: true
                - when:
                    condition: << parameters.use-codecov >>
                    steps:
                        - codecov/upload
                - store_artifacts:
                    path: tmp/capybara
        validate-api:
            description: |
                Validate openapi specification.
            steps:
                - run:
                    command: |
                        npm install openapi-enforcer-cli
                        result=$(npx openapi-enforcer validate openapi.yml)
                        [[ $result =~ "Document is valid" ]] && {
                        echo "Validation good"
                        exit 0
                        } || {
                        echo $result
                        exit 1
                        }
                    name: Validate API specification
    executors:
        ruby:
            description: |
                Ruby-only executor.
            docker:
                - environment:
                    BUNDLE_JOBS: "3"
                    BUNDLE_RETRY: "3"
                    PAGER: cat
                    RAILS_ENV: test
                    TZ: America/Los_Angeles
                  image: cimg/ruby:<< parameters.ruby-tag >>-node
            parameters:
                ruby-tag:
                    default: 3.4.1
                    description: The `cimg/ruby` Docker image version tag.
                    type: string
        ruby-postgres:
            description: |
                Ruby and postgres-only executor.
            docker:
                - environment:
                    BUNDLE_JOBS: "3"
                    BUNDLE_RETRY: "3"
                    PAGER: cat
                    RAILS_ENV: test
                    TZ: America/Los_Angeles
                  image: cimg/ruby:<< parameters.ruby-tag >>-node
                - environment:
                    POSTGRES_PASSWORD: sekret
                    POSTGRES_USER: postgres
                  image: cimg/postgres:<< parameters.postgres-tag >>
            parameters:
                postgres-tag:
                    default: "12.9"
                    description: The `cimg/postgres` Docker image version tag.
                    type: string
                ruby-tag:
                    default: 3.4.1
                    description: The `cimg/ruby` Docker image version tag.
                    type: string
        ruby-postgres-redis:
            description: |
                Ruby, postgres, and redis-only executor.
            docker:
                - environment:
                    BUNDLE_JOBS: "3"
                    BUNDLE_RETRY: "3"
                    PAGER: cat
                    RAILS_ENV: test
                    TZ: America/Los_Angeles
                  image: cimg/ruby:<< parameters.ruby-tag >>-node
                - environment:
                    POSTGRES_PASSWORD: sekret
                    POSTGRES_USER: postgres
                  image: cimg/postgres:<< parameters.postgres-tag >>
                - image: cimg/redis:6.2
            parameters:
                postgres-tag:
                    default: "12.9"
                    description: The `cimg/postgres` Docker image version tag.
                    type: string
                ruby-tag:
                    default: 3.4.1
                    description: The `cimg/ruby` Docker image version tag.
                    type: string
    jobs:
        docker-publish:
            description: |
                Build and deploy a Docker image. Supports multi-platform builds (e.g., linux/amd64,linux/arm64).
            executor: docker/machine
            parameters:
                docker-password:
                    default: DOCKER_PASS
                    description: |
                        Name of environment variable storing your Docker password
                    type: env_var_name
                docker-username:
                    default: DOCKER_USER
                    description: |
                        Name of environment variable storing your Docker username
                    type: env_var_name
                dockerfile:
                    default: Dockerfile
                    description: Name of dockerfile to use, defaults to Dockerfile
                    type: string
                extra_build_args:
                    default: ""
                    description: |
                        Extra flags to pass to docker build. For examples, see https://docs.docker.com/engine/reference/commandline/build
                    type: string
                image:
                    description: Name of image to build
                    type: string
                platforms:
                    default: linux/amd64,linux/arm64
                    description: Comma-separated list of target platforms (e.g., linux/amd64,linux/arm64)
                    type: string
                tag:
                    default: latest
                    description: Comma-separated list of image tags, defaults to latest
                    type: string
            steps:
                - checkout
                - docker/check:
                    docker_password: << parameters.docker-password >>
                    docker_username: << parameters.docker-username >>
                - run:
                    command: docker run --privileged --rm tonistiigi/binfmt --install all
                    name: Set up QEMU for multi-platform builds
                - run:
                    command: docker buildx create --use --name multiarch-builder
                    name: Set up Docker Buildx
                - run:
                    command: |
                        TAGS=""
                        IFS=',' read -ra TAG_LIST \<<< "<< parameters.tag >>"
                        for tag in "${TAG_LIST[@]}"; do
                          TAGS="$TAGS --tag << parameters.image >>:${tag}"
                        done
                        docker buildx build \
                          --platform << parameters.platforms >> \
                          $TAGS \
                          --file << parameters.dockerfile >> \
                          --push \
                          << parameters.extra_build_args >> \
                          .
                    name: Build and push Docker image
        herblint:
            description: |
                Perform herb linting.
            executor: << parameters.executor >>
            parameters:
                executor:
                    default: ruby
                    description: Executor to use for this job, defaults to ruby executor
                    type: executor
            steps:
                - checkout
                - ruby/install-deps
                - run:
                    command: bin/rake herb
                    name: Lint herbs
        lint:
            description: |
                Perform rubocop linting.
            executor: << parameters.executor >>
            parameters:
                executor:
                    default: ruby
                    description: Executor to use for this job, defaults to ruby executor
                    type: executor
            steps:
                - checkout
                - ruby/install-deps
                - rubocop-with-caching
        lint-erb:
            description: |
                Perform erb linting.
            executor: << parameters.executor >>
            parameters:
                executor:
                    default: ruby
                    description: Executor to use for this job, defaults to ruby executor
                    type: executor
            steps:
                - checkout
                - ruby/install-deps
                - run:
                    command: bundle exec erb_lint --lint-all --format compact
                    name: Lint ERBs
        lint-gem:
            description: |
                Perform rubocop linting for gems
            executor: << parameters.executor >>
            parameters:
                executor:
                    default: ruby
                    description: Executor to use for this job, defaults to ruby executor
                    type: executor
            steps:
                - checkout
                - gem-install-deps
                - rubocop-with-caching
        lint-js:
            description: |
                Perform javascript linting.
            executor: << parameters.executor >>
            parameters:
                executor:
                    default: node/default
                    description: Executor to use for this job, defaults to node executor
                    type: executor
            steps:
                - checkout
                - node/install-packages:
                    pkg-manager: yarn
                - run:
                    command: yarn run lint
                    name: Lint JavaScript
        stylelint:
            description: |
                Perform stylesheet linting.
            executor: << parameters.executor >>
            parameters:
                executor:
                    default: node/default
                    description: Executor to use for this job, defaults to node executor
                    type: executor
            steps:
                - checkout
                - node/install-packages:
                    pkg-manager: yarn
                - run:
                    command: yarn run stylelint
                    name: Lint styles
        test-gem:
            description: |
                Perform rspec testing without a database.
            executor: << parameters.executor >>
            parallelism: << parameters.parallelism >>
            parameters:
                before-test:
                    default: []
                    description: Optional steps to run before running rspec
                    type: steps
                executor:
                    default: ruby
                    description: Executor to use for this job, defaults to ruby executor
                    type: executor
                parallelism:
                    default: 1
                    description: Number of parallel containers to use for testing
                    type: integer
                use-codecov:
                    default: true
                    description: True because CodeClimate is no longer supported
                    type: boolean
            steps:
                - checkout
                - gem-install-deps
                - run:
                    command: bundle add rspec_junit_formatter
                    name: Install rspec_junit_formatter
                - when:
                    condition: << parameters.before-test >>
                    steps: << parameters.before-test >>
                - test:
                    use-codecov: << parameters.use-codecov >>
        test-rails:
            description: |
                Perform rspec testing of a Rails application.
            executor: << parameters.executor >>
            parallelism: << parameters.parallelism >>
            parameters:
                api-only:
                    default: false
                    description: True if this is an API only Rails app.
                    type: boolean
                before-test:
                    default: []
                    description: Optional steps to run before running rspec
                    type: steps
                db-prepare-command:
                    default: db:test:prepare
                    description: Database prepare command
                    type: string
                executor:
                    default: ruby-postgres
                    description: Executor to use for this job, defaults to ruby-postgres executor
                    type: executor
                install-chrome:
                    default: false
                    description: True to install Chrome
                    type: boolean
                install-firefox:
                    default: false
                    description: True to install Firefox
                    type: boolean
                install-java:
                    default: false
                    description: True to install Java
                    type: boolean
                parallelism:
                    default: 1
                    description: Number of parallel containers to use for testing
                    type: integer
                use-codecov:
                    default: true
                    description: True because CodeClimate is no longer supported
                    type: boolean
            steps:
                - checkout
                - ruby/install-deps
                - when:
                    condition: << parameters.install-chrome >>
                    steps:
                        - browser-tools/install-chrome
                - when:
                    condition: << parameters.install-firefox >>
                    steps:
                        - browser-tools/install-firefox
                - when:
                    condition: << parameters.install-java >>
                    steps:
                        - run:
                            command: sudo apt install openjdk-11-jdk
                            name: Install Java
                - unless:
                    condition: << parameters.api-only >>
                    steps:
                        - node/install-packages:
                            pkg-manager: yarn
                - run:
                    command: dockerize -wait tcp://localhost:5432 -timeout 1m
                    name: Wait for DB
                - run:
                    command: bin/rails << parameters.db-prepare-command >>
                    name: Test prepare
                - when:
                    condition: << parameters.before-test >>
                    steps: << parameters.before-test >>
                - test:
                    use-codecov: << parameters.use-codecov >>
        validate-api:
            description: |
                Validate openapi specification.
            executor: node/default
            steps:
                - checkout
                - validate-api
    examples:
        gem:
            description: |
                Gem.
            usage:
                version: "2.1"
                orbs:
                    ruby-rails: sul-dlss/ruby-rails@x.y.z
                workflows:
                    build:
                        jobs:
                            - ruby-rails/lint-gem:
                                context: dlss
                                name: lint
                            - ruby-rails/test-gem:
                                context: dlss
                                name: test
                                parallelism: 2
        rails_api:
            description: |
                Rails application (API).
            usage:
                version: "2.1"
                orbs:
                    ruby-rails: sul-dlss/ruby-rails@x.y.z
                workflows:
                    build:
                        jobs:
                            - ruby-rails/validate-api:
                                name: validate
                            - ruby-rails/lint:
                                context: dlss
                                name: lint
                            - ruby-rails/test-rails:
                                api-only: true
                                context: dlss
                                name: test
                                parallelism: 2
                            - ruby-rails/docker-publish:
                                context: dlss
                                filters:
                                    branches:
                                        only:
                                            - main
                                image: suldlss/your-app
                                name: publish-latest
                                requires:
                                    - validate
                                    - lint
                                    - test
        rails_web:
            description: |
                Rails application (web).
            usage:
                version: "2.1"
                orbs:
                    ruby-rails: sul-dlss/ruby-rails@x.y.z
                workflows:
                    build:
                        jobs:
                            - ruby-rails/lint:
                                context: dlss
                                name: lint
                            - ruby-rails/herblint
                            - ruby-rails/lint-erb
                            - ruby-rails/lint-js
                            - ruby-rails/stylelint
                            - ruby-rails/test-rails:
                                context: dlss
                                install-chrome: true
                                name: test
                                parallelism: 2

workflows:
  build:
    jobs:
      - ruby-rails/lint:
          name: lint
          context: dlss
      - ruby-rails/test-rails:
          name: test
          api-only: true
          context: dlss
          before-test:
            - run:
                name: validate openapi
                command: bin/rails r "exit(1) unless JSONSchemer.valid_schema?(YAML.load_file('openapi.yml'))"
      - ruby-rails/docker-publish:
          context: dlss
          name: publish-latest
          image: suldlss/dor-services-app
          extra_build_args: --build-arg BUNDLE_GEMS__CONTRIBSYS__COM
          requires:
            - lint
            - test
          filters:
            branches:
              only:
                - main
