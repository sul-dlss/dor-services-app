version: 2.1
orbs:
  ruby-rails: sul-dlss/ruby-rails@4.7.0
workflows:
  build:
    jobs:
      - ruby-rails/lint:
          name: lint
          context: dlss
      - ruby-rails/test-rails:
          name: test
          api-only: true
          context: dlss
          before-test:
            - run:
                name: validate openapi
                command: bin/rails r "exit(1) unless JSONSchemer.valid_schema?(YAML.load_file('openapi.yml'))"
      - ruby-rails/docker-publish:
          context: dlss
          name: publish-latest
          image: suldlss/dor-services-app
          extra_build_args: --build-arg BUNDLE_GEMS__CONTRIBSYS__COM
          requires:
            - lint
            - test
          filters:
            branches:
              only:
                - main
